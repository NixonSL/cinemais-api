services:
  postgres:
    image: postgres:16-alpine
    container_name: cinemais-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cinemais
      POSTGRES_PASSWORD: cinemais
      POSTGRES_DB: cinemais
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cinemais -d cinemais']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cinemais-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://cinemais:cinemais@postgres:5432/cinemais?schema=public
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
