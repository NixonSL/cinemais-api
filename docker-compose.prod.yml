services:
  postgres:
    image: postgres:16-alpine
    container_name: cinemais-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-cinemais}
    secrets:
      - postgres_user
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$(cat /run/secrets/postgres_user) -d ${POSTGRES_DB:-cinemais}']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cinemais-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-cinemais}
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    secrets:
      - postgres_user
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy

secrets:
  postgres_user:
    external: true
  postgres_password:
    external: true

volumes:
  postgres_data:
